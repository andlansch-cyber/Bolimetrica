<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolimétrica | Historial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                brandBlue: '#0f2137',
                brandAmber: '#c8880a',
              }
            }
          }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-display { font-family: 'Barlow Condensed', sans-serif; }
        #countdown-box {
            display: none;
            background-color: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            padding: 1rem 1.5rem;
            text-align: center;
        }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-800 min-h-screen">

    <header class="bg-brandBlue py-6 shadow-lg border-b-4 border-brandAmber">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <a href="/" class="font-display text-2xl tracking-wider uppercase font-extrabold text-white">
                Boli<span class="text-[#f0c060]">métrica</span>
            </a>
            <nav class="flex gap-6 text-xs font-bold text-slate-400 uppercase tracking-widest">
                <a href="/" class="hover:text-white transition-colors">Inicio</a>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-6 py-12 max-w-4xl">
        <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">

            <div class="p-8 border-b border-slate-100 bg-slate-50/50">
                <h1 class="font-display text-4xl font-bold text-brandBlue uppercase tracking-tight">Archivo de Informes</h1>
                <p class="text-slate-500 text-sm">Cronología de monitoreo digital en Bolivia. Mostrando solo los informes de los últimos 7 días.</p>
            </div>

            <div class="divide-y divide-slate-100">
                <div id="plantilla-countdown-banner" class="px-8 py-4 bg-slate-50 border-b border-slate-100 flex items-center gap-3 text-sm font-medium text-slate-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-brandAmber flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <span id="plantilla-countdown-text" class="font-mono font-bold text-brandAmber"></span>
                </div>
                {{FILAS_INFORMES}}
            </div>

        </div>
    </main>

    <script>
      (function () {
        const btnHoy       = document.getElementById("btn-hoy");
        const countdownBox = document.getElementById("countdown-box");
        const timer        = document.getElementById("countdown-timer");

        // Si no hay informe de hoy en la página, no hacer nada
        if (!btnHoy) return;

        function ahoraBolivia() {
          // Bolivia es UTC-4, sin horario de verano
          const ahora = new Date();
          return new Date(ahora.toLocaleString("en-US", { timeZone: "America/La_Paz" }));
        }

        function actualizarEstado() {
          const ahora   = ahoraBolivia();
          const hora9   = new Date(ahora);
          hora9.setHours(9, 0, 0, 0);
          const diff    = hora9 - ahora;

          if (diff <= 0) {
            // Ya pasaron las 9:00 AM → mostrar botón, ocultar countdown
            btnHoy.style.display       = "inline-block";
            countdownBox.style.display = "none";
          } else {
            // Antes de las 9:00 AM → ocultar botón, mostrar countdown
            btnHoy.style.display       = "none";
            countdownBox.style.display = "block";

            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            timer.textContent =
              String(h).padStart(2, "0") + ":" +
              String(m).padStart(2, "0") + ":" +
              String(s).padStart(2, "0");
          }
        }

        actualizarEstado();
        setInterval(actualizarEstado, 1000);
      })();

      // Countdown global (banner superior)
      (function () {
        const cdEl = document.getElementById("plantilla-countdown-text");
        if (!cdEl) return;
        function actualizar() {
            const ahora = new Date(new Date().toLocaleString("en-US", { timeZone: "America/La_Paz" }));
            const meta  = new Date(ahora);
            if (ahora.getHours() >= 9) meta.setDate(meta.getDate() + 1);
            meta.setHours(9, 0, 0, 0);
            const diff = meta - ahora;
            const h = String(Math.floor(diff / 3600000)).padStart(2, "0");
            const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, "0");
            const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, "0");
            const prefijo = ahora.getHours() >= 9 ? "Próxima actualización en" : "Disponible en";
            cdEl.textContent = `${prefijo} ${h}:${m}:${s}`;
        }
        actualizar();
        setInterval(actualizar, 1000);
      })();
    </script>
</body>
</html>
